services:
  bookshelf-db:
    image: postgres:16-alpine
    container_name: bookshelf-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookshelf
      POSTGRES_PASSWORD: bookshelf
      POSTGRES_DB: bookshelf
    volumes:
      - bookshelf-postgres:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookshelf -d bookshelf"]
      interval: 5s
      timeout: 5s
      retries: 10

  bookshelf:
    build: .
    container_name: bookshelf
    restart: unless-stopped
    env_file: .env
    depends_on:
      bookshelf-db:
        condition: service_healthy
    ports:
      - "3003:3000"
    environment:
      DATABASE_URL: postgresql://bookshelf:bookshelf@bookshelf-db:5432/bookshelf?schema=public
      EPUB_UPLOADS_DIR: /app/uploads
    volumes:
      - ${HOST_EPUB_UPLOADS_DIR:-./uploads}:/app/uploads

volumes:
  bookshelf-postgres:
